<!DOCTYPE html>
<html>
<head><title>AI Assistant</title></head>
<body>
<h2>🤖 AI Assistant</h2>
<div id="chat"></div>
<input id="input"/>
<button onclick="send()">Отправить</button>
<script>
async function send(){
    let input=document.getElementById("input")
    let text=input.value
    document.getElementById("chat").innerHTML += "<p>Ты: "+text+"</p>"
    let res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})})
    let data=await res.json()
    document.getElementById("chat").innerHTML += "<p>Бот: "+data.reply+"</p>"
    input.value=""
}
</script>
</body>
</html>
