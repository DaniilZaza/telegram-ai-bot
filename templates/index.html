<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Assistant</title>
<style>
body { font-family: Arial; max-width:600px; margin:auto; padding:20px; background:#fafafa; }
.chat { height:400px; overflow:auto; border:1px solid #ddd; padding:10px; border-radius:10px; background:white; display:flex; flex-direction:column; }
.msg { margin:10px; padding:8px; border-radius:10px; max-width:80%; word-wrap:break-word; }
.user { background:#cce5ff; align-self:flex-end; }
.bot { background:#eee; align-self:flex-start; }
#inputRow { display:flex; margin-top:10px; }
#inputField { flex:1; padding:10px; font-size:16px; border:1px solid #ddd; border-radius:8px; }
#sendButton { padding:10px 15px; margin-left:10px; font-size:16px; cursor:pointer; border:none; background:#007bff; color:white; border-radius:8px; }
#voiceButton { padding:10px 15px; margin-left:10px; font-size:16px; cursor:pointer; border:none; background:#28a745; color:white; border-radius:8px; }
</style>
</head>
<body>

<h2>🤖 AI Assistant</h2>
<div id="chat" class="chat"></div>

<div id="inputRow">
<input id="inputField" placeholder="Напиши сообщение..." />
<button id="sendButton">Отправить</button>
<button id="voiceButton">🎙</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("inputField");

function addMessage(text,type){
    const div=document.createElement("div");
    div.className="msg "+type;
    div.textContent=text;
    chat.appendChild(div);
    chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
    let text=input.value.trim();
    if(!text) return;
    addMessage(text,"user");
    input.value="";
    let res = await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    let data = await res.json();
    addMessage(data.reply,"bot");
}

document.getElementById("sendButton").onclick = sendMessage;
input.onkeydown = e => { if(e.key==="Enter") sendMessage(); }

document.getElementById("voiceButton").onclick = () => {
    addMessage("🎙 Голос временно отключен","bot");
}
</script>

</body>
</html>
